name: CI
on:
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "zulu"
      - uses: gradle/actions/setup-gradle@v3
      - name: Build
        run: ./gradlew build
      - name: Unit tests
        run: ./gradlew test