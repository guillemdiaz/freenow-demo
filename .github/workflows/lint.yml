name: ktlint
on:
  pull_request:
    branches: ["main"]
jobs:
  ktlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "zulu"
      - uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew ktlintCheck